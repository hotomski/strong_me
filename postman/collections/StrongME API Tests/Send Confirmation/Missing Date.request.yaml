$kind: http-request
url: "{{baseUrl}}/api/send-confirmation"
method: POST
headers:
  Content-Type: application/json
body:
  type: json
  content: |-
    {
      "email": "test@example.com"
    }
scripts:
  - type: afterResponse
    code: >-
      pm.test("Status code is 400", function () {
        pm.response.to.have.status(400);
      });


      pm.test("Response body has message 'Date and email are required.'",
      function () {
        var jsonData = pm.response.json();
        pm.expect(jsonData.message).to.equal("Date and email are required.");
      });
    language: text/javascript
order: 3000
