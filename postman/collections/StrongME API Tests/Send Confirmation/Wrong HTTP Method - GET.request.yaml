$kind: http-request
url: "{{baseUrl}}/api/send-confirmation"
method: GET
scripts:
  - type: afterResponse
    code: >-
      pm.test("Status code is 405", function () {
        pm.response.to.have.status(405);
      });


      pm.test("Response header 'Allow' exists and contains 'POST'", function ()
      {
        pm.expect(pm.response.headers.has("Allow")).to.be.true;
        var allowHeader = pm.response.headers.get("Allow");
        pm.expect(allowHeader).to.include("POST");
      });
    language: text/javascript
order: 5000
